{% extends 'base.html' %}

{% block content %}
<div class="glass-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1 class="page-title" style="margin-bottom: 0;">Edit Game</h1>
        <a href="{{ url_for('admin') }}" class="btn btn-dark">Back to Admin</a>
    </div>
    
    <div class="add-form-container">
        <form method="POST" action="{{ url_for('edit_game', id=game.id) }}" id="editGameForm">
            <div class="form-grid">
                <div class="form-col-left">
                    <div class="form-group">
                        <label for="name">Game Name</label>
                        <input type="text" id="name" name="name" required value="{{ game.name }}">
                    </div>
                    <div class="form-group">
                        <label for="size">Game Size</label>
                        <input type="text" id="size" name="size" required value="{{ game.size }}">
                    </div>
                    <div class="form-group">
                        <label>Genre</label>
                        <div class="genre-select-container" id="genreSelectContainer">
                            <div class="genre-pills" id="genrePills"></div>
                            <div class="dropdown-trigger" id="dropdownTrigger">
                                <span>Select Genres <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
                            </div>
                            <div class="dropdown-menu" id="dropdownMenu">
                                <div class="dropdown-search">
                                    <input type="text" id="genreDropdownSearch" placeholder="Search genres..." onclick="event.stopPropagation()">
                                </div>
                                <div id="dropdownItemsList"></div>
                            </div>
                            <input type="hidden" name="genres" id="genresHidden" value="{{ game.genre }}">
                        </div>
                    </div>
                </div>
                <div class="form-col-right">
                    <div class="form-group upload-group">
                        <label for="cover_url">Cover Image URL</label>
                        <div class="upload-zone" id="coverUrlZone">
                            {% if game.cover_url %}
                            <img src="{{ game.cover_url }}" alt="Current Cover" style="max-height: 100px; border-radius: 4px; margin-bottom: 10px;">
                            {% else %}
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            {% endif %}
                            <input type="text" id="cover_url" name="cover_url" value="{{ game.cover_url }}" placeholder="Paste image URL here..." style="width: 90%; text-align: center; background: transparent; border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.5rem; color: #fff;">
                        </div>
                    </div>
                </div>
            </div>
            <div style="text-align: right; margin-bottom: 2rem;">
                <button type="submit" class="btn btn-primary btn-glow">Update Game</button>
            </div>
        </form>
    </div>
</div>

<script>
// Genre Pills Logic
const genrePillsContainer = document.getElementById('genrePills');
const genresHidden = document.getElementById('genresHidden');
const dropdownMenu = document.getElementById('dropdownMenu');
const dropdownItemsList = document.getElementById('dropdownItemsList');
const dropdownTrigger = document.getElementById('dropdownTrigger');
const genreSelectContainer = document.getElementById('genreSelectContainer');
const genreDropdownSearch = document.getElementById('genreDropdownSearch');

// Initialize genres from hidden input
let initialGenresStr = genresHidden.value.trim();
let genres = initialGenresStr ? initialGenresStr.split(',').map(g => g.trim()) : [];

const availableGenres = ["Action", "Adventure", "RPG", "Strategy", "Simulation", "Sports", "Racing", "Horror", "Puzzle", "FPS", "Turn-Base", "MOBA", "Survival", "Battle Royale", "Sandbox", "Role-Play", "MMORPG", "RTS", "Anime", "Dating Sim", "Arcade", "Party", "Dance", "Adult", "Cooking", "Education"];

if (dropdownItemsList) {
    availableGenres.forEach(g => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.textContent = g;
        div.onclick = (e) => {
            e.stopPropagation();
            if (!genres.includes(g)) {
                genres.push(g);
                renderPills();
            }
            genreDropdownSearch.value = '';
            filterDropdown('');
        };
        dropdownItemsList.appendChild(div);
    });

    dropdownTrigger.onclick = (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('show');
        if(dropdownMenu.classList.contains('show')) {
            genreDropdownSearch.focus();
        }
    };

    genreDropdownSearch.addEventListener('keyup', (e) => {
        filterDropdown(e.target.value.toUpperCase());
    });

    function filterDropdown(filterText) {
        const items = dropdownItemsList.getElementsByClassName('dropdown-item');
        for (let i = 0; i < items.length; i++) {
            let txtValue = items[i].textContent || items[i].innerText;
            if (txtValue.toUpperCase().indexOf(filterText) > -1) {
                items[i].style.display = "";
            } else {
                items[i].style.display = "none";
            }
        }
    }

    document.addEventListener('click', (e) => {
        if (!genreSelectContainer.contains(e.target)) {
            dropdownMenu.classList.remove('show');
        }
    });
}

function renderPills() {
    genrePillsContainer.innerHTML = '';
    genres.forEach((genre, index) => {
        const pill = document.createElement('div');
        pill.className = 'pill';
        pill.innerHTML = `${genre} <span class="pill-remove" onclick="removeGenre(event, ${index})">&times;</span>`;
        genrePillsContainer.appendChild(pill);
    });
    genresHidden.value = genres.join(', ');

    if (dropdownItemsList) {
        Array.from(dropdownItemsList.children).forEach(item => {
            if (genres.includes(item.textContent)) {
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        });
    }
}

function removeGenre(e, index) {
    e.stopPropagation();
    genres.splice(index, 1);
    renderPills();
}

// Initial render
renderPills();
</script>
{% endblock %}
