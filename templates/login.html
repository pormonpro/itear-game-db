{% extends 'base.html' %}

{% block content %}
<div class="login-container glass-panel">
    <h1 class="page-title">Admin Access</h1>
    
    {% if error %}
    <div class="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="admin_id">Admin ID</label>
            <input type="text" id="admin_id" name="admin_id" required placeholder="Enter Admin ID">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="password123">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login to Dashboard</button>
    </form>
</div>
{% endblock %}
